# MongoDB Atlas Connection
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/deliverymanagement}
spring.data.mongodb.database=deliverymanagement

# JWT Configuration
jwt.secret=${JWT_SECRET:testSecretKeyThatIsAtLeast256BitsLongForHmacSha256Algorithm}
jwt.expiration=86400000

# Server
server.port=${PORT:8080}

# CORS
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}
