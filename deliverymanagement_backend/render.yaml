services:
  - type: web
    name: delivery-management-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    region: oregon
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: "https://project-qic85i10t-23eg105p57-2359s-projects.vercel.app"
      - key: PORT
        value: 8080
